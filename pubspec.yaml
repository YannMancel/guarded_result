name: guarded_result
description: The `guarded_result` package is a Dart library designed to simplify result handling by encapsulating either a success or an error, whilst automating exception handling through code generation.
version: 1.0.0
repository: https://github.com/YannMancel/guarded_result

environment:
  sdk: ^3.8.1

dependencies:
  analyzer: ^12.0.0
  build: ^4.0.5
  collection: ^1.19.1
  source_gen: ^4.2.2
  meta: ^1.18.2

dev_dependencies:
  build_runner: ^2.13.1
  lints: ^6.1.0
  test: ^1.31.0
